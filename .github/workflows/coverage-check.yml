name: Coverage Check

on:
  push:
    branches:
      - main
      - '002-**'
  pull_request:
    branches:
      - main

jobs:
  coverage:
    name: Unit tests and coverage gate (>= 80%)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore Fortuno.sln

      - name: Build Fortuno.Tests (Release)
        run: dotnet build Fortuno.Tests/Fortuno.Tests.csproj --configuration Release --no-restore

      - name: Run unit tests with coverage
        run: |
          dotnet test Fortuno.Tests/Fortuno.Tests.csproj \
            --configuration Release \
            --no-build \
            --settings Fortuno.Tests/coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage-raw

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage summary
        run: |
          export PATH="$PATH:/home/runner/.dotnet/tools"
          reportgenerator \
            -reports:"./coverage-raw/**/coverage.cobertura.xml" \
            -targetdir:./coverage-report \
            -reporttypes:"TextSummary;HtmlSummary" \
            -assemblyfilters:"+Fortuno.Domain;+Fortuno.Application;+Fortuno.Infra"

      - name: Enforce 80% line coverage
        run: |
          SUMMARY_FILE="./coverage-report/Summary.txt"
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "::error::Summary.txt não encontrado em $SUMMARY_FILE"
            exit 1
          fi

          echo "--- Coverage summary ---"
          cat "$SUMMARY_FILE"
          echo "------------------------"

          LINE_COVERAGE=$(grep -E "Line coverage:" "$SUMMARY_FILE" | head -n1 | sed -E 's/.*:\s*([0-9.]+)%.*/\1/')

          if [ -z "$LINE_COVERAGE" ]; then
            echo "::error::Não foi possível extrair a métrica Line coverage de Summary.txt"
            exit 1
          fi

          echo "Line coverage: ${LINE_COVERAGE}%"
          awk -v cov="$LINE_COVERAGE" -v threshold=80 'BEGIN { exit (cov+0 >= threshold+0) ? 0 : 1 }'
          if [ $? -ne 0 ]; then
            echo "::error::Line coverage ${LINE_COVERAGE}% está abaixo do piso de 80%"
            exit 1
          fi

          echo "OK: cobertura acima do piso"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
